    <style>
        /* Reset margins and ensure the body takes up the full viewport */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Deep dark background to eliminate distractions */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrollbars during animation scaling */
            
            /* CSS Grid is the most robust way to perfectly center content on any device */
            display: grid;
            place-items: center;
        }

        /* The main text container */
        .focused-text {
            /* Responsive typography scales with the viewport width */
            font-size: clamp(2rem, 8vw, 8rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 0.05em;
            
            /* Apply the continuous animation */
            animation: dopaminePulse 2.5s infinite ease-in-out;
            
            /* Add a subtle initial glow */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            
            /* Ensures the user can't select the text, adding to the visual-only experience */
            user-select: none; 
            cursor: default;
        }

        /* Keyframes for the shrink/zoom (pulsing) effect */
        @keyframes dopaminePulse {
            0% {
                transform: scale(0.9);
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }
            50% {
                transform: scale(1.15); /* Zooms in */
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.9), 0 0 80px rgba(255, 255, 255, 0.4); /* Intensifies the glow */
                letter-spacing: 0.1em; /* Slightly expands the space between letters */
            }
            100% {
                transform: scale(0.9); /* Shrinks back */
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }
        }
    </style>
</head>
<body>

    <div class="focused-text">
        Boobless Bitch
    </div>

</body>
